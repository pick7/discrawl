name: release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify and send to Homebrew (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-15
            arch: arm64
          - runs-on: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runs-on }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout trusted verifier
        uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Download signed macOS artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          mkdir -p artifacts
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir artifacts \
            --pattern "checksums.txt" \
            --pattern "discrawl_${version}_darwin_${{ matrix.arch }}.tar.gz"

      - name: Verify Developer ID signature
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          ./scripts/verify-macos-release.sh \
            "$RELEASE_TAG" \
            "artifacts/discrawl_${version}_darwin_${{ matrix.arch }}.tar.gz" \
            artifacts/checksums.txt

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: verify-macos
    steps:
      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$TAG_INPUT"
          else
            release_tag="$RELEASE_TAG"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+A-Za-z0-9]+)?$ ]]; then
            echo "::error::Invalid release tag"
            exit 1
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow access to openclaw/homebrew-tap"
            exit 1
          fi

          request_id="discrawl-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update discrawl for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo openclaw/homebrew-tap \
            --ref main \
            -f formula=discrawl \
            -f tag="$RELEASE_TAG" \
            -f repository=openclaw/discrawl \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo openclaw/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"$expected_title\") | .databaseId" | head -n1)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          gh run watch "$run_id" \
            --repo openclaw/homebrew-tap \
            --exit-status \
            --interval 10
